syntax = "proto3";
// Potion-crafting system interface contract (toy example). Client = server, one and the same.

// ---- Crafting R-POT-CRAFT ----
message C2S_PotionCraft { int32 recipeId = 1; }            // 1700
message S2C_PotionCraft {
  int32 err     = 1;   // 0=OK / ERR_MATERIAL_LACK / ERR_ITEM_LACK
  int32 potionId = 2;  // output potion id (=recipe.output)
  int32 count   = 3;   // output quantity
}

// ---- Use R-POT-USE ----
message C2S_PotionUse { int32 potionId = 1; }              // 1701
message S2C_PotionUse {
  int32 err  = 1;
  int32 heal = 2;      // actual heal = potion.heal + potionLv[lv].heal, capped at max HP
}
